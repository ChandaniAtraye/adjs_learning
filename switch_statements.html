<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> switch Statement</title>
</head>
<body>
    <script>
        let day = 9;
        switch(day){
            case 1 :
            console.log("Monday");
            break;
            case 2 :
            console.log("Tuesday");
            break;
            case 3 :
            console.log("Wed");
            break;
            case 4 :
            console.log("Thursday");
            break;
            case 5 :
            console.log("Fri");
            break;
            case 6 :
            console.log("Sat");
            break;
            case 7 :
            console.log("Sunday");
            break;
            default:
            console.log("Check the day once again");
        }
    </script>
</body>
</html>
