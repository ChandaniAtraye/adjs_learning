<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>async_await_fetch_api</title>
</head>
<body>
    <h2> Fetch Data Using Async / Await</h2>
    <button onclick="loadComments()">Load Comments</button>
    <pre id="output"></pre>

    <script>
        async function loadComments(){
            try{
                document.getElementById("output").textContent =" Loading Comments..";
                const response = await fetch("https://jsonplaceholder.typicode.com/comments");
                if(!response.ok){
                    throw new Error("Network response was not ok");
                }
                const data = await response.json();

                let result ="Data Loaded Successfully \n \n";
                data.forEach(comments => {
                    result += `Name : ${comments.name} \n Email : ${comments.email} \n \n`;
                });
                document.getElementById("output").textContent = result;
            }
            catch(error){
                document.getElementById("output").textContent ="Error :" + error.message;
            }
            finally{
                console.log("Fetch process completed");

            }
        }
    </script>
</body>
</html>
