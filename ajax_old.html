<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ajax_old</title>
</head>
<body>
    <h2> Ajax load local data</h2>
    <button onclick="loadText()"> Load Text File</button>
    <button onclick="loadJSON()"> Load JSON File</button>
    
    <pre id = "ajaxData">click to button to load data </pre>
    <script>
        function loadText(){
            var xhr = new XMLHttpRequest(); // create a new AJAX request

            xhr.open("GET" ,"file.txt",true); // GET - >type of request ,> file to load>make  request asynchronous(non-blocking)

            xhr.onload = function(){
                if(xhr.status===200){
                    document.getElementById("ajaxData").textContent = xhr.responseText;
                }else{
                    document.getElementById("ajaxData").textContent = "Error Loading text file";
                }
            };
            xhr.onerror = function() {
                document.getElementById("ajaxData").textContent ="Request failed";
                
            };
            xhr.send();
        }


        function loadJSON(){
            var xhr = new XMLHttpRequest(); // create a new AJAX request

            xhr.open("GET" ,"data.json",true); // GET - >type of request ,> file to load>make  request asynchronous(non-blocking)

            xhr.onload = function(){
                if(xhr.status===200){
                    var data =JSON.parse(xhr.responseText);
                    document.getElementById("ajaxData").textContent = JSON.stringify(data,null,4);
                }else{
                    document.getElementById("ajaxData").textContent = "Error Loading text file";
                }
            };
            xhr.onerror = function() { // if there is a network or connection error 
                document.getElementById("ajaxData").textContent ="Request failed";
                
            };
            xhr.send();
        }




    </script>
</body>
</html>
