<body>
    <script>
        //assigning object attributes to variables
        const person = {
            name:"vai",
            age:21,
            gender:"female"
        }
        document.write(`My name is : ${person.name},my age is:${person.age}, gender : ${person.gender}<br>`);

        let name = person.name;
        let age = person.age;
        let gender = person.gender;
        document.write(`My name is : ${name} , My age is ${age}, gender: ${gender} <br>`);


    </script>
    <script>
        const person1 = {
            name1:"vai",
            age1:21,
            gender1:"female"
        }
        //destructuring assignment
        let {name1,age1,gender1} = person1;
        document.write(`My name is : ${name} , My age is ${age}, gender: ${gender}`);

    </script>
